name: Nightly CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: MoonBit nightly checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MoonBit nightly
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s -- nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: moon version --all

      - name: Update MoonBit registry
        run: moon update

      - name: Run repository checks
        run: moon run --target native scripts/check_ci.mbtx --skip-without-credentials
