name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: MoonBit checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: moon version --all

      - name: Set up DotSlash
        uses: facebook/install-dotslash@latest

      - name: Set up Scrut
        env:
          SCRUT_VERSION: v0.4.3
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "https://github.com/facebookincubator/scrut/releases/download/${SCRUT_VERSION}/scrut" \
            > scrut
          chmod +x scrut
          echo "SCRUT_BIN=$PWD/scrut" >> "$GITHUB_ENV"

      - name: Run repository checks
        run: bash scripts/check_ci.sh --skip-without-credentials
