name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: MoonBit checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: moon version --all

      - name: Check release version consistency
        run: python3 scripts/check_release_version.py

      - name: Check formatting
        run: moon fmt --check

      - name: Check interfaces
        run: bash scripts/check_interfaces.sh

      - name: Type check
        run: moon check --warn-list +73

      - name: Type check all targets
        run: moon check --target all --warn-list +73

      - name: Type check native CLI
        run: moon check --target native cmd/main --warn-list +73

      - name: Run tests
        run: moon test

      - name: Run JS tests
        run: moon test --target js

      - name: Run native tests
        run: moon test --target native

      - name: Analyze coverage
        run: bash scripts/check_coverage.sh

      - name: Build and smoke test native CLI
        run: bash scripts/smoke_native_cli.sh

      - name: Verify Mooncakes package
        run: bash scripts/verify_mooncakes_package.sh --skip-without-credentials
