name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: MoonBit checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: moon version --all

      - name: Check formatting
        run: moon fmt --check

      - name: Check interfaces
        run: |
          moon info
          git diff --exit-code -- pkg.generated.mbti cmd/main/pkg.generated.mbti

      - name: Type check
        run: moon check --warn-list +73

      - name: Type check native CLI
        run: moon check --target native cmd/main --warn-list +73

      - name: Run tests
        run: moon test

      - name: Build and smoke test native CLI
        run: |
          moon run --target native --release --build-only cmd/main
          CLI="_build/native/release/build/cmd/main/main.exe"
          printf '<article><p>Hi <b>there</b></p><p>Bye</p></article>' \
            | "$CLI" - --selector p --format text > /tmp/html_parser_cli_text.txt
          diff -u <(printf 'Hi there\nBye\n') /tmp/html_parser_cli_text.txt
          set +e
          printf '<p>Hello</p>' | "$CLI" - --selector '.does-not-exist' > /tmp/html_parser_cli_empty.txt
          code=$?
          set -e
          test "$code" -eq 1
          test ! -s /tmp/html_parser_cli_empty.txt
          "$CLI" tests/fixtures/justhtml/data/wikipedia.html --format markdown > /tmp/html_parser_wikipedia.md
          first_line="$(grep -m1 -v '^[[:space:]]*$' /tmp/html_parser_wikipedia.md)"
          case "$first_line" in
            \<img*) ;;
            *)
              echo "Expected Wikipedia Markdown to start with body image, got: $first_line" >&2
              exit 1
              ;;
          esac
          grep -F 'The Free Encyclopedia' /tmp/html_parser_wikipedia.md
          grep -F '(https://en.wikipedia.org/)' /tmp/html_parser_wikipedia.md
          grep -F '[Wikiquote Free quote compendium](https://www.wikiquote.org/)' /tmp/html_parser_wikipedia.md
          grep -F '[MediaWiki Free &amp; open wiki software](https://www.mediawiki.org/)' /tmp/html_parser_wikipedia.md
          grep -F '[Wikisource Free content library](https://www.wikisource.org/)' /tmp/html_parser_wikipedia.md
          grep -F '[Wikispecies Free species directory](https://species.wikimedia.org/)' /tmp/html_parser_wikipedia.md
          grep -F '[Wikifunctions Free function library](https://www.wikifunctions.org/)' /tmp/html_parser_wikipedia.md
          grep -F '[Meta-Wiki Community coordination &amp; documentation](https://meta.wikimedia.org/)' /tmp/html_parser_wikipedia.md

      - name: Verify Mooncakes package
        run: |
          if [ ! -f "$HOME/.moon/credentials.json" ]; then
            echo "Skipping Mooncakes dry-run because this runner is not logged in."
            exit 0
          fi
          set +e
          output="$(moon publish --dry-run 2>&1)"
          exit_code=$?
          printf '%s\n' "$output"
          if [ "$exit_code" -ne 0 ] && ! printf '%s\n' "$output" | grep -q "Dry run completed successfully"; then
            exit "$exit_code"
          fi
