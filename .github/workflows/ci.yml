name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: MoonBit checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: moon version --all

      - name: Check formatting
        run: moon fmt --check

      - name: Check interfaces
        run: |
          moon info
          git diff --exit-code -- pkg.generated.mbti cmd/main/pkg.generated.mbti

      - name: Type check
        run: moon check --warn-list +73

      - name: Run tests
        run: moon test

      - name: Verify Mooncakes package
        run: |
          set +e
          output="$(moon publish --dry-run 2>&1)"
          exit_code=$?
          printf '%s\n' "$output"
          if [ "$exit_code" -ne 0 ] && ! printf '%s\n' "$output" | grep -q "Dry run completed successfully"; then
            exit "$exit_code"
          fi
